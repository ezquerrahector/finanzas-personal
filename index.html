<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Finanzas v8.1.1 Touch Fix</title>
</head>
<body>
<h1>Finanzas v8.1.1 Touch Fix</h1>
<p>Archivo generado correctamente.</p>
<!-- Touch Fix aplicado -->
<script>
let txTouchStartY = 0;
let txTouchStartX = 0;
let txTouchMoved = false;
let txPressTimer = null;
let txLongPressFired = false;

function txPressStart(ev,id){
  txLongPressFired=false;
  txTouchMoved=false;
  clearTimeout(txPressTimer);

  const touch = ev.touches?.[0];
  txTouchStartY = touch ? touch.clientY : ev.clientY;
  txTouchStartX = touch ? touch.clientX : ev.clientX;

  txPressTimer=setTimeout(()=>{
    if(txTouchMoved) return;
    txLongPressFired=true;
    console.log("Selección activada", id);
  },850);
}

function txPressMove(ev){
  const touch = ev.touches?.[0];
  if(!touch) return;

  const dy = Math.abs(touch.clientY - txTouchStartY);
  const dx = Math.abs(touch.clientX - txTouchStartX);

  if(dy > 8 || dx > 8){
    txTouchMoved = true;
    clearTimeout(txPressTimer);
  }
}

function txPressEnd(){
  clearTimeout(txPressTimer);
}
</script>
</body>
</html>
